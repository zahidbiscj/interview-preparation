name: Deploy crackInterview to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'code/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/package-lock.json

      - name: Install dependencies
        working-directory: code
        run: npm ci --legacy-peer-deps

      - name: Inject OpenRouter key
        working-directory: code
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: |
          mkdir -p src/environments
          printf 'export const environment = {\n  production: true,\n  openrouterKey: "%s",\n  openrouterModel: "meta-llama/llama-3.3-70b-instruct:free",\n};\n' \
            "$OPENROUTER_KEY" > src/environments/environment.prod.ts

      - name: Build
        working-directory: code
        run: npx ng build --configuration=production --base-href=/interview-preparation/

      - name: SPA fallback (404.html) + disable Jekyll
        working-directory: code
        run: |
          cp dist/code/browser/index.html dist/code/browser/404.html
          touch dist/code/browser/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: code/dist/code/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
