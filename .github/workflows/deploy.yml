name: Deploy crackInterview to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'code/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: code/package-lock.json

      - name: Install dependencies
        working-directory: code
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: code
        run: npx ng build --configuration=production --base-href=/interview-preparation/

      - name: SPA fallback (404.html) + disable Jekyll
        working-directory: code
        run: |
          cp dist/code/browser/index.html dist/code/browser/404.html
          touch dist/code/browser/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: code/dist/code/browser
          publish_branch: gh-pages
